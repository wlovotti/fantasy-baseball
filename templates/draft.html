<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Baseball Draft Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Draft Tracker</h1>
        <div id="draft-stats">
            <span>Picks left: <strong id="picks-remaining">-</strong></span>
            <span>Picks made: <strong id="picks-made">-</strong></span>
        </div>
    </header>

    <div class="container">
        <!-- Draft Input -->
        <section id="draft-input">
            <h2>Record Pick</h2>
            <form id="draft-form">
                <div class="form-row">
                    <div class="form-group autocomplete-wrapper">
                        <label for="player-search">Player</label>
                        <input type="text" id="player-search" placeholder="Search player..." autocomplete="off">
                        <div id="autocomplete-list" class="autocomplete-items"></div>
                    </div>
                    <div class="form-group">
                        <label for="price">Price ($)</label>
                        <input type="number" id="price" min="0" max="260" value="1">
                    </div>
                    <div class="form-group">
                        <label for="team-select">Team</label>
                        <select id="team-select">
                            {% for tid, team in teams.items() %}
                            <option value="{{ tid }}">{{ team.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Draft</button>
                </div>
            </form>
            <button id="undo-btn" class="btn btn-secondary">Undo Last Pick</button>
        </section>

        <div class="main-grid">
            <!-- Player Table -->
            <section id="player-table-section">
                <h2>Available Players</h2>
                <div class="table-controls">
                    <input type="text" id="table-filter" placeholder="Filter players...">
                    <select id="type-filter">
                        <option value="">All</option>
                        <option value="hitter">Hitters</option>
                        <option value="pitcher">Pitchers</option>
                    </select>
                </div>
                <div class="table-wrapper">
                    <table id="player-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Pos</th>
                                <th>Team</th>
                                <th>Pts</th>
                                <th>Value</th>
                            </tr>
                        </thead>
                        <tbody id="player-tbody"></tbody>
                    </table>
                </div>
            </section>

            <!-- Sidebar -->
            <aside id="sidebar">
                <!-- Team Budgets -->
                <section id="team-budgets">
                    <h2>Team Budgets</h2>
                    <div id="team-budget-list"></div>
                </section>

                <!-- Position Slots -->
                <section id="position-slots">
                    <h2 class="collapsible-header" onclick="togglePositionSlots()">
                        Position Slots <span id="pos-slots-toggle-icon">▼</span>
                    </h2>
                    <div id="position-slots-grid"></div>
                </section>

                <!-- Tier Depletion -->
                <section id="tier-depletion">
                    <h2 class="collapsible-header" onclick="toggleTiers()">
                        Tier Depletion <span id="tier-toggle-icon">▼</span>
                    </h2>
                    <div id="tier-depletion-grid"></div>
                </section>

                <!-- Recent Picks -->
                <section id="recent-picks">
                    <h2>Recent Picks</h2>
                    <div id="recent-picks-list"></div>
                </section>
            </aside>
        </div>
    </div>

    <!-- Team Roster Modal -->
    <div id="team-roster-modal" class="modal-overlay" style="display:none">
        <div class="modal-content">
            <button class="modal-close" onclick="closeTeamRosterModal()">&times;</button>
            <div id="team-roster-body"></div>
        </div>
    </div>

    <!-- Add Player Modal -->
    <div id="add-player-modal" class="modal-overlay" style="display:none">
        <div class="modal-content">
            <button class="modal-close" onclick="closeAddPlayerModal()">&times;</button>
            <h2>Add Unknown Player</h2>
            <form id="add-player-form">
                <div class="form-group">
                    <label for="add-player-name">Player Name</label>
                    <input type="text" id="add-player-name" required>
                </div>
                <div class="form-group">
                    <label>Positions</label>
                    <div class="checkbox-grid">
                        <label><input type="checkbox" name="add-pos" value="C"> C</label>
                        <label><input type="checkbox" name="add-pos" value="1B"> 1B</label>
                        <label><input type="checkbox" name="add-pos" value="2B"> 2B</label>
                        <label><input type="checkbox" name="add-pos" value="3B"> 3B</label>
                        <label><input type="checkbox" name="add-pos" value="SS"> SS</label>
                        <label><input type="checkbox" name="add-pos" value="OF"> OF</label>
                        <label><input type="checkbox" name="add-pos" value="SP"> SP</label>
                        <label><input type="checkbox" name="add-pos" value="RP"> RP</label>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="add-player-price">Price ($)</label>
                        <input type="number" id="add-player-price" min="0" max="260" value="1">
                    </div>
                    <div class="form-group">
                        <label for="add-player-team">Team</label>
                        <select id="add-player-team">
                            {% for tid, team in teams.items() %}
                            <option value="{{ tid }}">{{ team.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Add &amp; Draft</button>
            </form>
        </div>
    </div>

    <script>
        const MY_TEAM_ID = {{ my_team_id }};
    </script>
    <script src="/static/draft.js"></script>
</body>
</html>
